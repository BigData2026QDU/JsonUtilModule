name: Build and Release

on:
  issues:
    types: [opened]
  workflow_dispatch:
    inputs:
      version:
        description: '版本号 (例: 1.0.0)'
        required: true
        type: string

jobs:
  release:
    runs-on: ubuntu-latest
    if: |
      (github.event_name == 'issues' && startsWith(github.event.issue.title, '[可发布]')) ||
      (github.event_name == 'workflow_dispatch')
    permissions:
      contents: write
      issues: write
    
    steps:
      - name: Acknowledge trigger
        if: github.event_name == 'issues'
        uses: actions/github-script@v6
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            await github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: '✅ 收到测试通过通知，开始构建和发布流程...'
            });

      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Build with Maven
        run: mvn clean package -DskipTests

      - name: Get version from git tags
        id: version
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "version=${{ github.event.inputs.version }}" >> $GITHUB_OUTPUT
          else
            LATEST_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "v0.0.0")
            echo "latest_tag=$LATEST_TAG" >> $GITHUB_OUTPUT
            
            if [ "$LATEST_TAG" = "v0.0.0" ]; then
              echo "version=1.0.0" >> $GITHUB_OUTPUT
            else
              VERSION=${LATEST_TAG#v}
              IFS='.' read -r MAJOR MINOR PATCH <<< "$VERSION"
              PATCH=$((PATCH + 1))
              echo "version=${MAJOR}.${MINOR}.${PATCH}" >> $GITHUB_OUTPUT
            fi
          fi

      - name: Create GitHub Release
        if: success()
        id: create_release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.version }}
          name: Release v${{ steps.version.outputs.version }}
          body: |
            ## JsonUtilModule v${{ steps.version.outputs.version }}
            
            ### 变更内容
            - JSON 序列化/反序列化工具类
            - 支持 Java 8 日期时间
            - 支持 Hibernate 懒加载处理
            
            ### 使用方法
            ```xml
            <dependency>
                <groupId>org.example</groupId>
                <artifactId>JsonUtilModule</artifactId>
                <version>${{ steps.version.outputs.version }}</version>
            </dependency>
            ```
            
            ---
            🤖 此 Release 由测试框架自动触发
            ${{ github.event_name == 'issues' && format('📋 触发 Issue: #{0}', github.event.issue.number) || '🔧 手动触发' }}
          files: JsonUtilModule/target/*.jar
          draft: false
          prerelease: false

      - name: Close trigger issue on success
        if: success() && github.event_name == 'issues'
        uses: actions/github-script@v6
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            await github.rest.issues.update({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'closed'
            });
            
            await github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `✅ 构建和发布成功！\n\nRelease: ${{ steps.create_release.outputs.html_url }}\n版本: v${{ steps.version.outputs.version }}`
            });

      - name: Comment on failure
        if: failure()
        uses: actions/github-script@v6
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            if (context.eventName === 'issues') {
              await github.rest.issues.createComment({
                issue_number: context.issue.number,
                owner: context.repo.owner,
                repo: context.repo.repo,
                body: '❌ 构建失败，请检查日志。\n\n' +
                      '**工作流运行：** https://github.com/' + context.repo.owner + '/' + context.repo.repo + '/actions/runs/' + context.runId
              });
            }
